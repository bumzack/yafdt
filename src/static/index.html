<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Duplicate Finder</title>
<link href="/vendor/bootstrap.min.css" rel="stylesheet">
<style>
  body { padding: 1rem; max-width: 1200px; margin: 0 auto; }
  .topbar { position: sticky; top: 0; background: #fff; z-index: 20; padding: .5rem 0; border-bottom: 1px solid #eee; margin-bottom: .5rem; }
  .folder-card { margin-bottom: .5rem; }
  .folder-header { cursor: pointer; }
  details summary { cursor: pointer; list-style: none; }
  details summary::-webkit-details-marker { display: none; }
  .chev { transition: transform .15s; display:inline-block; }
  details[open] .chev { transform: rotate(90deg); }
  .file-row { font-size:.82rem; color:#495057; padding:.1rem .3rem .1rem 1.6rem; word-break: break-all; }
  .file-size { color:#888; font-size:.75rem; }
  .badge-keep { background:#198754; }
  .badge-move { background:#dc3545; }
</style>
</head>
<body>

<div class="topbar d-flex flex-wrap align-items-center gap-2">
  <span class="fw-bold">Duplicate Finder</span>
  <span id="summary" class="text-muted small"></span>
  <div class="ms-auto d-flex gap-2">
    <button id="keepAllBtn" class="btn btn-outline-success btn-sm">Keep all</button>
    <button id="keepNoneBtn" class="btn btn-outline-secondary btn-sm">Keep none</button>
    <button id="previewBtn" class="btn btn-outline-primary btn-sm">Preview move</button>
    <button id="moveBtn" class="btn btn-warning btn-sm">Move non-kept</button>
  </div>
</div>

<div id="blockWarning" class="alert alert-danger py-2 d-none">
  No folder is marked to <b>keep</b>. Move is blocked until you check at least one folder.
</div>
<div id="moveResult" class="alert alert-info py-2 d-none"></div>

<div id="previewPanel" class="card mb-3 d-none">
  <div class="card-header d-flex align-items-center">
    <span class="fw-semibold">Move preview</span>
    <span id="previewSummary" class="text-muted small ms-2"></span>
    <button id="previewClose" class="btn-close ms-auto" aria-label="Close"></button>
  </div>
  <div class="card-body p-2" style="max-height: 360px; overflow:auto;">
    <div id="previewErrors" class="alert alert-warning py-1 mb-2 d-none"></div>
    <table class="table table-sm table-borderless mb-0">
      <thead><tr><th>Source</th><th>Destination</th><th class="text-end">Size</th></tr></thead>
      <tbody id="previewBody"></tbody>
    </table>
  </div>
</div>

<div id="folders"></div>

<script src="/vendor/jquery.min.js"></script>
<script src="/vendor/bootstrap.bundle.min.js"></script>
<script>
const API = "";
function esc(s){ return $('<div>').text(s).html(); }
function human(b){ if(b>=1024*1024*1024) return (b/1024/1024/1024).toFixed(2)+" GB";
  if(b>=1024*1024) return (b/1024/1024).toFixed(2)+" MB";
  if(b>=1024) return (b/1024).toFixed(1)+" KB"; return b+" B"; }
function openKey(f){ return "open:"+f; }
function rememberOpen(f, val){ val ? localStorage.setItem(openKey(f),"1") : localStorage.removeItem(openKey(f)); }
function isOpen(f){ return localStorage.getItem(openKey(f))==="1"; }

function refresh(){
  $.getJSON(API+"/api/state").done(function(s){
    $("#summary").html(
      `root: <code>${esc(s.root)}</code> &middot; ` +
      `target: <code>${esc(s.target)}</code> &middot; ` +
      `${s.folders.length} folder(s) &middot; ${s.total_files} duplicate file(s) &middot; ` +
      `${human(s.total_size)} total &middot; ${s.kept_folders} kept`
    );
    const noKept = s.folders.length > 0 && s.kept_folders === 0;
    $("#blockWarning").toggleClass("d-none", !noKept);
    $("#moveBtn").prop("disabled", s.folders.length === 0 || noKept);
    $("#previewBtn").prop("disabled", s.folders.length === 0 || noKept);
    renderFolders(s.folders);
  }).fail(function(){
    $("#folders").html('<div class="text-danger">Failed to load state.</div>');
  });
}

function renderFolders(folders){
  const $box = $("#folders").empty();
  if (!folders.length){
    $box.html('<div class="text-muted">No duplicates found.</div>');
    return;
  }
  folders.forEach((f, fi) => {
    const open = isOpen(f.folder);
    const card = $(`
      <div class="card folder-card ${f.keep ? "border-success" : "border-warning"}">
        <div class="card-header py-2">
          <details ${open?"open":""}>
            <summary class="folder-header d-flex align-items-center gap-2">
              <span class="chev">\u25B6</span>
              <div class="form-check">
                <input class="form-check-input keep-cb" type="checkbox" ${f.keep?"checked":""}>
              </div>
              <span class="fw-semibold">${esc(f.folder)}</span>
              <span class="badge bg-secondary">${f.files.length} file${f.files.length===1?"":"s"}</span>
              <span class="badge bg-light text-dark">${human(f.total_size)}</span>
              ${f.keep ? '<span class="badge badge-keep">keep</span>' : '<span class="badge badge-move">move</span>'}
            </summary>
          </details>
        </div>
        <div class="card-body p-2"></div>
      </div>
    `);
    const $body = card.find(".card-body");
    f.files.forEach(file => {
      $body.append(
        `<div class="file-row">${esc(file.path)} <span class="file-size">${human(file.size)}</span></div>`
      );
    });
    $box.append(card);

    card.find("details").on("toggle", function(){ rememberOpen(f.folder, this.open); });
    card.find(".keep-cb").on("click", function(e){
      e.stopPropagation();
      const keep = this.checked;
      $.ajax({url:API+"/api/mark_folder", method:"POST",
        contentType:"application/json", data: JSON.stringify({folder: f.folder, keep: keep})})
       .done(refresh);
    });
  });
}

$("#moveBtn").on("click", function(){
  if (!confirm("Move every duplicate file in NON-kept folders to the target?\n"
             + "Each file keeps its relative path under the root. This cannot be undone.")) return;
  $("#moveResult").addClass("d-none");
  $.post(API+"/api/move").done(function(res){
    let msg;
    if (res.errors && res.errors.length){
      msg = `Moved ${res.moved} file(s). ${res.errors.length} error(s):\n` + res.errors.join("\n");
      alert(msg);
      $("#moveResult").removeClass("d-none alert-info").addClass("alert-warning")
        .text(`Moved ${res.moved}; ${res.errors.length} error(s) — see alert.`);
    } else if (!res.ok && res.errors && res.errors.length===1 && res.moved===0){
      // blocked (no kept)
      $("#moveResult").addClass("d-none");
    } else {
      msg = `Moved ${res.moved} file(s).`;
      $("#moveResult").removeClass("d-none alert-warning").addClass("alert-info").text(msg);
    }
    refresh();
  }).fail(function(){ alert("Move request failed."); refresh(); });
});

$("#previewBtn").on("click", function(){
  $.post(API+"/api/preview").done(function(res){
    const $panel = $("#previewPanel").removeClass("d-none");
    const $body = $("#previewBody").empty();
    const $err = $("#previewErrors").addClass("d-none").empty();
    if (!res.ok && res.errors && res.errors.length){
      $err.removeClass("d-none").text(res.errors.join("\n"));
      $("#previewSummary").text("");
      return;
    }
    res.plan.forEach(p => {
      $body.append(
        `<tr><td class="path-muted">${esc(p.src)}</td>` +
        `<td class="path-muted">${esc(p.dest)}</td>` +
        `<td class="text-end file-size">${human(p.size)}</td></tr>`
      );
    });
    $("#previewSummary").text(
      `${res.plan.length} file(s) \u2022 ${human(res.total_size)} \u2022 ${res.kept_folders} folder(s) kept`
    );
  }).fail(function(){ alert("Preview request failed."); });
});

$("#previewClose").on("click", function(){
  $("#previewPanel").addClass("d-none");
});

$("#keepAllBtn").on("click", function(){
  $.ajax({url:API+"/api/mark_all", method:"POST",
    contentType:"application/json", data: JSON.stringify({keep:true})}).done(refresh);
});
$("#keepNoneBtn").on("click", function(){
  $.ajax({url:API+"/api/mark_all", method:"POST",
    contentType:"application/json", data: JSON.stringify({keep:false})}).done(refresh);
});

refresh();
</script>
</body>
</html>
